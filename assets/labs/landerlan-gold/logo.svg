<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 240" role="img" aria-labelledby="title desc">
  <title id="title">Landerlan Gold</title>
  <desc id="desc">Assinatura visual em preto e dourado para o catálogo Landerlan Gold.</desc>
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff2a8"/>
      <stop offset="0.35" stop-color="#e2bd55"/>
      <stop offset="0.72" stop-color="#a87318"/>
      <stop offset="1" stop-color="#f1d77a"/>
    </linearGradient>
    <radialGradient id="disc" cx="35%" cy="28%" r="78%">
      <stop offset="0" stop-color="#2a2a29"/>
      <stop offset="0.62" stop-color="#11110f"/>
      <stop offset="1" stop-color="#050505"/>
    </radialGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000" flood-opacity="0.48"/>
    </filter>
  </defs>
  <rect width="760" height="240" rx="28" fill="#050505"/>
  <g transform="translate(32 24)" filter="url(#shadow)">
    <circle cx="96" cy="96" r="84" fill="url(#disc)" stroke="url(#gold)" stroke-width="5"/>
    <path d="M52 142 87 49h32l-26 68h54l-10 25H52Z" fill="url(#gold)"/>
    <path d="M118 49h29l-12 31h-29l12-31Z" fill="#fff1a6" opacity=".88"/>
  </g>
  <g transform="translate(230 58)">
    <text x="0" y="54" fill="url(#gold)" font-family="Arial, Helvetica, sans-serif" font-size="58" font-weight="800" letter-spacing="2">LANDERLAN</text>
    <text x="4" y="111" fill="#f1d77a" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="700" letter-spacing="12">GOLD</text>
    <text x="7" y="145" fill="#8f8f88" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="600" letter-spacing="7">PREMIUM SERIES</text>
  </g>
</svg>