<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#080808">
  <meta name="description" content="Central de catálogos ALLEC IMPORTS/LAB.">
  <meta property="og:title" content="ALLEC IMPORTS/LAB | Catálogos">
  <meta property="og:description" content="Consulte os catálogos por laboratório e fale com um consultor.">
  <meta property="og:type" content="website">
  <title>ALLEC IMPORTS/LAB | Catálogos</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="brand-cards.css">
</head>
<body>
  <main class="shell">
    <header class="hero">
      <div class="brand-mark" aria-hidden="true">A</div>
      <p class="eyebrow">CENTRAL DE CATÁLOGOS</p>
      <h1>ALLEC <span>IMPORTS/LAB</span></h1>
      <p class="subtitle">Selecione um laboratório para consultar produtos e valores.</p>
    </header>

    <section class="toolbar" aria-label="Pesquisa">
      <input id="search" type="search" placeholder="Buscar laboratório ou produto" autocomplete="off">
      <span id="resultCount" class="count"></span>
    </section>

    <section>
      <div id="brandGrid" class="brand-grid" aria-live="polite"></div>
      <p id="emptyState" class="empty" hidden>Nenhum resultado encontrado.</p>
    </section>

    <section class="contact-grid" aria-label="Canais de atendimento">
      <a id="whatsappLink" class="contact whatsapp" target="_blank" rel="noopener noreferrer">
        <strong>WhatsApp</strong><span>Consultar um consultor</span>
      </a>
      <a id="telegramLink" class="contact telegram" target="_blank" rel="noopener noreferrer">
        <strong>Telegram</strong><span>Acessar grupo VIP</span>
      </a>
    </section>

    <footer>
      <p>© <span id="year"></span> ALLEC IMPORTS/LAB</p>
      <p class="note">Disponibilidade e valores sujeitos a confirmação.</p>
    </footer>
  </main>
  <script src="catalog-data.js"></script>
  <script src="lab-brand-assets.js"></script>
  <script src="app.js" defer></script>
</body>
</html>
